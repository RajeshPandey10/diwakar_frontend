name: 🚀 Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: ✨ Create .env
        run: echo "NEXT_PUBLIC_API_URL=https://api.cadiwakarpandey.com.np/api" > .env

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build

      - name: 📂 Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.nepoproduct.com
          username: cadiwakar@cadiwakarpandey.com.np
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: out/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
